version: '3.8'

services:
  app:
    build: .
    expose:
      - "5001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    # Ensure your .env file is also loaded if needed
    env_file:
      - .env
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: nginx_gatekeeper
    ports:
      - "8080:80"  # Map the server's port 8080 to Nginx's port 80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: always