server {
    listen 80;
    server_name _; # This catches all traffic hitting your server IP

    location / {
        # 'app' is the name of our service in docker-compose
        proxy_pass http://app:5001; 
        
        # These headers ensure your Node app knows the user's real IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}